<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ThingLink Kiosk</title>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    #tourContainer {
      width: 100%;
      height: 100%;
    }

    #tourContainer iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    #hint {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.5);
      color: white;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 14px;
      z-index: 10;
      pointer-events: none;
    }
  </style>
</head>

<body>

<div id="tourContainer">
  <iframe 
    id="tourFrame"
    src="https://www.thinglink.com/view/scene/1889567083826512358"
    allowfullscreen
    scrolling="no">
  </iframe>
</div>

<div id="hint">The library resets itself for each explorer…</div>

<script async src="https://cdn.thinglink.me/jse/responsive.js"></script>

<script>
  const RESET_MS = 90000; // 90 seconds
  let timer;

  function restartTour() {
    const frame = document.getElementById("tourFrame");
    frame.src = frame.src; // reload iframe
  }

  function resetTimer() {
    clearTimeout(timer);
    timer = setTimeout(restartTour, RESET_MS);
  }

  ["click", "touchstart", "touchmove", "mousemove", "keydown"].forEach(evt => {
    document.addEventListener(evt, resetTimer, { passive: true });
  });

  resetTimer();
</script>

</body>
</html>
