<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ThingLink Kiosk</title>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
    }

    #startScreen,
    #tourContainer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    #startScreen {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: white;
      background: black;
      padding: 40px;
      box-sizing: border-box;
      z-index: 20;
    }

    #startScreen h1 {
      font-size: 2.2rem;
      margin-bottom: 16px;
    }

    #startScreen p {
      max-width: 700px;
      font-size: 1.1rem;
      line-height: 1.6;
      margin: 8px 0;
    }

    #startButton {
      margin-top: 28px;
      padding: 14px 28px;
      font-size: 1rem;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      background: white;
      color: black;
      font-weight: bold;
    }

    #startButton:hover {
      opacity: 0.9;
    }

    #tourContainer {
      display: none;
      z-index: 1;
    }

    #tourFrame {
      width: 100%;
      height: 100%;
      border: none;
    }

    #resetButton {
      position: absolute;
      top: 0;
      right: 0;
    
      width: 360px;   /* adjust if needed */
      height: 70px;   /* adjust if needed */
    
      z-index: 20;
    
      border: none;
      border-radius: 0 0 0 40px;
    
      background: rgba(0, 0, 0, 0.9);
      color: white;
    
      font-size: 16px;
      font-weight: bold;
    
      cursor: pointer;
    
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding-left: 24px;
    }

    #resetButton:hover {
      background: rgba(0,0,0,0.85);
    }

    #hint {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.5);
      color: white;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 14px;
      z-index: 10;
      pointer-events: none;
      display: none;
    }
  </style>
</head>
<body>

  <div id="startScreen">
    <h1>Libbie and the Hat Hunt</h1>
    <p>Explore the space by tapping the hotspots around the image. You can move around by dragging the image.</p>
    <p>When you are done, simply walk away. The hunt will reset automatically for the next player.</p>
    <button id="startButton">Start The Hunt!</button>
  </div>

  <div id="tourContainer">
    <iframe
      id="tourFrame"
      src=""
      allowfullscreen
      scrolling="no">
    </iframe>

    <button id="resetButton">Start Over</button>
  </div>

  <div id="hint">This hunt will reset after inactivity.</div>

  <script async src="https://cdn.thinglink.me/jse/responsive.js"></script>

  <script>
    const THINGLINK_URL = "https://www.thinglink.com/view/scene/1889567083826512358";
    const RESET_MS = 5000; // testing

    const startScreen = document.getElementById("startScreen");
    const tourContainer = document.getElementById("tourContainer");
    const tourFrame = document.getElementById("tourFrame");
    const startButton = document.getElementById("startButton");
    const resetButton = document.getElementById("resetButton");
    const hint = document.getElementById("hint");

    let timer = null;
    let experienceStarted = false;

    function showStartScreen() {
      experienceStarted = false;
      clearTimeout(timer);

      tourFrame.src = "";
      tourContainer.style.display = "none";
      hint.style.display = "none";
      startScreen.style.display = "flex";
    }

    function startExperience() {
      experienceStarted = true;

      startScreen.style.display = "none";
      tourContainer.style.display = "block";
      hint.style.display = "block";

      tourFrame.src = THINGLINK_URL;
      resetTimer();
    }

    function resetToStartScreen() {
      showStartScreen();
    }

    function resetTimer() {
      if (!experienceStarted) return;
      clearTimeout(timer);
      timer = setTimeout(resetToStartScreen, RESET_MS);
    }

    function resetExperienceNow() {
      showStartScreen();
    }

    startButton.addEventListener("click", startExperience);
    startButton.addEventListener("touchstart", startExperience);

    resetButton.addEventListener("click", resetExperienceNow);
    resetButton.addEventListener("touchstart", resetExperienceNow);

    ["click", "touchstart", "touchmove", "mousemove", "keydown"].forEach(evt => {
      document.addEventListener(evt, resetTimer, { passive: true });
    });

    showStartScreen();
  </script>

</body>
</html>
